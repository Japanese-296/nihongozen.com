<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NihongoZen — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --sakura:#e91e8c;--sakura-d:#c2185b;--sakura-light:#fff0f7;
    --ink:#1a1a2e;--ink-light:#64748b;--border:#f0e6ef;
    --white:#fff;--shadow:0 4px 24px rgba(194,24,91,.13);
  }
  body{
    font-family:'DM Sans',sans-serif;
    background:linear-gradient(135deg,#fff0f7 0%,#fce4f3 40%,#e8f4ff 100%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:1rem;
  }

  /* ── Card ── */
  .card{
    background:#fff;border-radius:28px;
    box-shadow:0 8px 48px rgba(194,24,91,.18);
    width:100%;max-width:420px;padding:2.5rem 2rem;
    position:relative;overflow:hidden;
  }
  .card::before{
    content:'';position:absolute;top:-60px;right:-60px;
    width:180px;height:180px;border-radius:50%;
    background:radial-gradient(circle,rgba(233,30,140,.12),transparent 70%);
    pointer-events:none;
  }

  /* ── Logo ── */
  .logo{text-align:center;margin-bottom:1.5rem;}
  .logo-icon{font-size:3rem;display:block;margin-bottom:.5rem;}
  .logo h1{font-family:'Noto Serif JP',serif;font-size:1.6rem;color:var(--ink);font-weight:700;}
  .logo p{color:var(--ink-light);font-size:.85rem;margin-top:.25rem;}

  /* ── Divider ── */
  .divider{display:flex;align-items:center;gap:.75rem;margin:1.2rem 0;color:var(--ink-light);font-size:.8rem;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

  /* ── Social buttons ── */
  .social-btn{
    display:flex;align-items:center;justify-content:center;gap:.75rem;
    width:100%;padding:.85rem 1rem;border-radius:14px;
    border:1.5px solid var(--border);background:#fff;
    font-size:.95rem;font-weight:600;font-family:'DM Sans',sans-serif;
    cursor:pointer;transition:all .2s;margin-bottom:.75rem;
    color:var(--ink);
  }
  .social-btn:hover{border-color:var(--sakura);background:var(--sakura-light);transform:translateY(-1px);box-shadow:var(--shadow);}
  .social-btn:active{transform:translateY(0);}
  .social-btn img,.social-btn svg{width:22px;height:22px;flex-shrink:0;}
  .social-btn.google{border-color:#dadce0;}
  .social-btn.facebook{border-color:#1877f2;color:#1877f2;}
  .social-btn.google:hover{border-color:#4285f4;background:#f0f4ff;}
  .social-btn.facebook:hover{border-color:#1877f2;background:#f0f6ff;}

  /* ── Email form ── */
  .email-group{display:flex;flex-direction:column;gap:.6rem;margin-bottom:.75rem;}
  .email-group input{
    width:100%;padding:.85rem 1rem;border-radius:12px;
    border:1.5px solid var(--border);font-size:.95rem;
    font-family:'DM Sans',sans-serif;color:var(--ink);
    outline:none;transition:border-color .2s;
  }
  .email-group input:focus{border-color:var(--sakura);}
  .email-group input::placeholder{color:#b0a8b4;}

  .btn-primary{
    width:100%;padding:.9rem;border-radius:14px;border:none;
    background:linear-gradient(135deg,var(--sakura),var(--sakura-d));
    color:#fff;font-size:.95rem;font-weight:700;
    font-family:'DM Sans',sans-serif;cursor:pointer;
    transition:all .2s;box-shadow:0 4px 16px rgba(194,24,91,.35);
  }
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(194,24,91,.45);}
  .btn-primary:active{transform:translateY(0);}
  .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none;}

  /* ── Messages ── */
  .msg{border-radius:10px;padding:.75rem 1rem;font-size:.85rem;margin-bottom:.75rem;display:none;}
  .msg.error{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;}
  .msg.success{background:#dcfce7;color:#16a34a;border:1px solid #86efac;}
  .msg.info{background:#dbeafe;color:#1d4ed8;border:1px solid #93c5fd;}

  /* ── Loading spinner ── */
  .spinner{
    display:none;width:20px;height:20px;border-radius:50%;
    border:2.5px solid rgba(255,255,255,.3);
    border-top-color:#fff;animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .social-btn .spinner{border-color:rgba(0,0,0,.15);border-top-color:var(--ink);}

  /* ── Footer ── */
  .card-footer{text-align:center;margin-top:1.2rem;font-size:.8rem;color:var(--ink-light);}
  .card-footer a{color:var(--sakura);text-decoration:none;font-weight:600;}

  /* ── Email link sent state ── */
  .email-sent{display:none;text-align:center;padding:1rem 0;}
  .email-sent .ei{font-size:3rem;display:block;margin-bottom:.75rem;}
  .email-sent h3{color:var(--ink);font-size:1.1rem;margin-bottom:.5rem;}
  .email-sent p{color:var(--ink-light);font-size:.85rem;line-height:1.6;}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="logo-icon">🌸</span>
    <h1>NihongoZen</h1>
    <p>Your Japanese learning journey starts here</p>
  </div>

  <!-- Error / Success messages -->
  <div class="msg error" id="login-error"></div>
  <div class="msg success" id="login-success"></div>
  <div class="msg info" id="login-info"></div>

  <!-- Google -->
  <button class="social-btn google" id="googleLogin">
    <svg viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.3 33.3 29.7 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l6-6C34.3 6.5 29.4 4.5 24 4.5 12.7 4.5 3.5 13.7 3.5 25S12.7 45.5 24 45.5c11 0 20.5-8 20.5-20.5 0-1.4-.2-2.7-.5-4z"/><path fill="#34A853" d="M6.3 14.7l7 5.1C15 16.1 19.2 13 24 13c3.1 0 5.9 1.2 8 3.1l6-6C34.3 6.5 29.4 4.5 24 4.5c-7.6 0-14.2 4.4-17.7 10.2z"/><path fill="#FBBC05" d="M24 45.5c5.3 0 10.1-1.9 13.8-5l-6.4-5.2C29.5 36.9 26.9 38 24 38c-5.6 0-10.3-3.8-11.9-9H5.1c3.4 7.1 10.6 12 18.9 12z"/><path fill="#EA4335" d="M44.5 20H24v8.5h11.8c-.8 2.3-2.3 4.2-4.2 5.7l6.4 5.2c3.8-3.5 6-8.7 6-14.9 0-1.4-.2-2.7-.5-4z"/></svg>
    <span>Continue with Google</span>
    <div class="spinner" id="googleSpinner"></div>
  </button>

  <!-- Facebook -->
  <button class="social-btn facebook" id="facebookLogin">
    <svg viewBox="0 0 48 48"><path fill="#1877F2" d="M48 24C48 10.7 37.3 0 24 0S0 10.7 0 24c0 12 8.8 21.9 20.3 23.7V31h-6v-7h6v-5.4c0-6 3.5-9.3 9-9.3 2.6 0 5.3.5 5.3.5v5.9h-3c-2.9 0-3.8 1.8-3.8 3.7V24h6.5l-1 7h-5.5v16.7C39.2 45.9 48 36 48 24z"/></svg>
    <span>Continue with Facebook</span>
    <div class="spinner" id="facebookSpinner"></div>
  </button>



  <div class="divider">or continue with email</div>

  <!-- Email Link Login -->
  <div class="email-group">
    <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email"/>
    <button class="btn-primary" id="emailLogin">
      Send Magic Link 🔗
    </button>
  </div>

  <!-- Email sent confirmation -->
  <div class="email-sent" id="emailSent">
    <span class="ei">📬</span>
    <h3>Check your inbox!</h3>
    <p>We sent a magic login link to <strong id="sentEmailAddr"></strong>.<br>Click it to sign in — no password needed.</p>
  </div>

  <div class="card-footer">
    By signing in you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>
  </div>
</div>

<script type="module" src="auth.js"></script>

</body>
</html>
