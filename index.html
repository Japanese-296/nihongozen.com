<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="NihongoZen — Japanese Language Learning Platform"/>
<meta name="theme-color" content="#0F0F14"/>
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com;
           style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
           script-src 'self' 'unsafe-inline';
           img-src 'self' data:;
           font-src https://fonts.gstatic.com;
           media-src 'self';"/>
<title>NihongoZen — Japanese Learning</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

<!-- Stylesheets -->
<link rel="stylesheet" href="css/tokens.css"/>
<link rel="stylesheet" href="css/layout.css"/>
<link rel="stylesheet" href="css/components.css"/>
</head>
<body>

<!-- All JS (order matters) -->
<script src="js/core.js"></script>
<script src="js/data.js"></script>
<script src="js/pomodoro.js"></script>
<script src="js/pages.js"></script>

<script>
'use strict';
/* =========================================================
   APP BOOTSTRAP
   ========================================================= */
(function init() {
  // Ensure demo session
  Session.ensureDemo();

  // Build shell
  renderShell();

  // Register all routes
  Router.register('dashboard', ()  => Pages.dashboard());
  Router.register('kanji',     ()  => Pages.kanji());
  Router.register('vocab',     (p) => Pages.vocab(p));
  Router.register('grammar',   ()  => Pages.grammar());
  Router.register('listening', ()  => Pages.listening());
  Router.register('reading',   ()  => Pages.reading());
  Router.register('kana',      ()  => Pages.kana());
  Router.register('progress',  ()  => Pages.progress());
  Router.register('timer',     ()  => Pages.timer());
  Router.register('profile',   ()  => Pages.profile());
  Router.register('jlpt-n5',   ()  => Pages.jlptLevel('n5'));
  Router.register('jlpt-n4',   ()  => Pages.jlptLevel('n4'));
  Router.register('jlpt-n3',   ()  => Pages.jlptLevel('n3'));
  Router.register('jlpt-n2',   ()  => Pages.jlptLevel('n2'));
  Router.register('jlpt-n1',   ()  => Pages.jlptLevel('n1'));

  // Load dashboard on start
  Router.go('dashboard');

  // Handle browser back/forward (hash-based routing)
  window.addEventListener('popstate', () => {
    const hash = window.location.hash.replace('#','') || 'dashboard';
    Router.go(hash);
  });
})();
</script>
</body>
</html>
